# Cloudflare Worker configuration for the Auth314 core service.
name = "auth314"
main = "worker/src/index.ts"
compatibility_date = "2024-06-01"

# --- KV namespace binding ---
# Create the namespace first:
#   wrangler kv:namespace create AUTH314_KV
# then paste the returned id below (and a preview id for `wrangler dev`).
[[kv_namespaces]]
binding = "AUTH314_KV"
id = "883b391ac30c4c618e99c5e725941f83"

# --- Non-secret config variables ---
# (The Pi OAuth client id and authorize URL live in portal/public/config.js --
# they're consumed by the browser, not the Worker.)
[vars]
# The verify/callback UI's own domain (not the auth314.com marketing site,
# which lives in the separate auth314-web repo). /verify/init builds
# verify_url from this.
PORTAL_BASE_URL = "https://app.auth314.com"
# Only callbacks to this origin may receive pi identity via the "dashboard"
# platform flow. Prevents third-party keys from claiming platform "dashboard"
# to exfiltrate pi_uid/pi_username to their own callback_url.
DASHBOARD_ORIGIN = "https://dashboard.auth314.com"

# --- Static assets (portal UI) ---
[assets]
directory = "./portal/dist"

# --- Secrets (do NOT put these here) ---
# Set with:
#   wrangler secret put PI_API_KEY
