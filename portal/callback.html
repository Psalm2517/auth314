<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Auth314 — Verifying</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="card">
      <div class="brand">Auth<span>314</span></div>
      <div class="subtitle">Pi Network verification</div>

      <!-- processing -->
      <div id="state-processing" class="state active">
        <div class="spinner"></div>
        <h1>Verifying…</h1>
        <p>Confirming your Pi identity.</p>
      </div>

      <!-- success -->
      <div id="state-success" class="state">
        <div class="icon success">✓</div>
        <h1>Verified!</h1>
        <p id="success-message">
          Verification complete. You can close this page.
        </p>
      </div>

      <!-- error -->
      <div id="state-error" class="state">
        <div class="icon error">✕</div>
        <h1>Something went wrong</h1>
        <p id="error-message">Something went wrong. Please try again.</p>
      </div>

      <div class="footer">Powered by Auth314</div>
    </div>

    <script src="config.js"></script>
    <script>
      (function () {
        var cfg = window.AUTH314_CONFIG || {};

        function show(id) {
          var states = document.querySelectorAll(".state");
          for (var i = 0; i < states.length; i++) {
            states[i].classList.remove("active");
          }
          document.getElementById(id).classList.add("active");
        }

        function showError(msg) {
          if (msg) document.getElementById("error-message").textContent = msg;
          show("state-error");
        }

        function showSuccess() {
          show("state-success");
        }

        var ERROR_MESSAGES = {
          access_denied: "You declined Pi Sign-in. Please try again.",
          expired: "Sign-in request timed out. Please try again.",
          cancelled: "Sign-in was cancelled. Please try again.",
          server_error: "Pi Sign-in encountered an error. Please try again.",
        };

        var params = new URLSearchParams(window.location.hash.slice(1));

        // Verify CSRF state before trusting anything else in the fragment.
        var expectedState = null;
        try {
          expectedState = sessionStorage.getItem("pi_oauth_state");
          sessionStorage.removeItem("pi_oauth_state");
        } catch (e) {}

        var returnedState = params.get("state");

        // Clear the token/fragment from the URL immediately so it isn't left
        // sitting in browser history.
        history.replaceState(null, "", window.location.pathname);

        if (!expectedState || returnedState !== expectedState) {
          showError("Sign-in could not be verified (state mismatch). Please try again.");
          return;
        }

        var oauthError = params.get("error");
        if (oauthError) {
          showError(
            ERROR_MESSAGES[oauthError] ||
              "Pi Sign-in failed. Please try again."
          );
          return;
        }

        var accessToken = params.get("access_token");
        if (!accessToken) {
          showError("No access token returned from Pi. Please restart verification.");
          return;
        }

        var session = null;
        try {
          session = sessionStorage.getItem("pi_session");
          sessionStorage.removeItem("pi_session");
        } catch (e) {}

        if (!session) {
          showError("Your verification session was lost. Please restart from your community bot.");
          return;
        }

        show("state-processing");

        fetch(cfg.API_BASE_URL.replace(/\/$/, "") + "/auth/callback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ access_token: accessToken, session: session }),
        })
          .then(function (res) {
            return res.json().then(function (data) {
              return { ok: res.ok, data: data };
            });
          })
          .then(function (result) {
            if (result.ok) {
              showSuccess();
            } else {
              showError(
                (result.data && result.data.error) ||
                  "Verification could not be completed."
              );
            }
          })
          .catch(function () {
            showError("Could not reach the verification service. Please try again.");
          });
      })();
    </script>
  </body>
</html>
