<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Auth314 — Pi Sign-in</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="card">
      <div class="brand">Auth<span>314</span></div>
      <div class="subtitle">Pi Network verification</div>

      <!-- ready -->
      <div id="state-ready" class="state">
        <h1>Verify your Pi account</h1>
        <p>Confirm your Pi identity to complete verification for your community.</p>
        <button id="signin-btn" class="btn">Sign in with Pi</button>
      </div>

      <!-- redirecting -->
      <div id="state-redirecting" class="state">
        <div class="spinner"></div>
        <h1>Redirecting…</h1>
        <p>Taking you to Pi Sign-in.</p>
      </div>

      <!-- error -->
      <div id="state-error" class="state">
        <div class="icon error">✕</div>
        <h1>Something went wrong</h1>
        <p id="error-message">This verification link is invalid or has expired.</p>
      </div>

      <div class="footer">Powered by Auth314</div>
    </div>

    <script src="config.js"></script>
    <script>
      (function () {
        var cfg = window.AUTH314_CONFIG || {};

        function show(id) {
          var states = document.querySelectorAll(".state");
          for (var i = 0; i < states.length; i++) {
            states[i].classList.remove("active");
          }
          document.getElementById(id).classList.add("active");
        }

        function showError(msg) {
          if (msg) {
            document.getElementById("error-message").textContent = msg;
          }
          show("state-error");
        }

        var params = new URLSearchParams(window.location.search);
        var session = params.get("session");

        if (!session) {
          showError("No verification session found. Please use the link from your community bot.");
          return;
        }

        show("state-ready");

        document.getElementById("signin-btn").addEventListener("click", function () {
          show("state-redirecting");

          var state = crypto.randomUUID();
          try {
            sessionStorage.setItem("pi_oauth_state", state);
            sessionStorage.setItem("pi_session", session);
          } catch (e) {
            showError("This browser is blocking storage needed to complete sign-in.");
            return;
          }

          var url;
          try {
            url = new URL(cfg.PI_AUTHORIZE_BASE_URL);
            url.searchParams.set("response_type", "token");
            url.searchParams.set("client_id", cfg.PI_OAUTH_CLIENT_ID);
            url.searchParams.set(
              "redirect_uri",
              cfg.PORTAL_BASE_URL.replace(/\/$/, "") + "/callback.html"
            );
            url.searchParams.set("scope", "username");
            url.searchParams.set("state", state);
          } catch (e) {
            showError("Portal configuration is invalid. Please contact support.");
            return;
          }

          window.location.assign(url.toString());
        });
      })();
    </script>
  </body>
</html>
